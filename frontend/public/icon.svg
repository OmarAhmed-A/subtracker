<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="secondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background with subtle border -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <rect width="508" height="508" x="2" y="2" rx="110" fill="none" stroke="#1e293b" stroke-width="4" />

  <!-- Outer looping track -->
  <path d="M 160 180 C 160 100, 352 100, 352 180 C 352 220, 256 256, 256 256 C 256 256, 160 292, 160 332 C 160 412, 352 412, 352 332" 
        fill="none" stroke="#1e293b" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Glowing dynamic stroke (Cyan/Blue) -->
  <path d="M 160 180 C 160 100, 352 100, 352 180 C 352 220, 256 256, 256 256" 
        fill="none" stroke="url(#primary)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Glowing dynamic stroke (Emerald) -->
  <path d="M 256 256 C 256 256, 160 292, 160 332 C 160 412, 352 412, 352 332" 
        fill="none" stroke="url(#secondary)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />

  <!-- Accents / Nodes -->
  <circle cx="160" cy="180" r="24" fill="#ffffff" />
  <circle cx="352" cy="332" r="24" fill="#ffffff" />
</svg>